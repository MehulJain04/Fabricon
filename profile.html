<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Profile - TextileMarket</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="lang-en">
    <header class="sticky-header">
        <div class="container header-content">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                    <img src="LOGO/Gemini_Generated_Image_d28pfqd28pfqd28p-removebg-preview.png" alt="Fabricon Logo" style="height: 42px; width: auto; max-width: 200px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.06)); margin-right: 5px;">
                    <div style="display: flex; flex-direction: column; justify-content: center; margin-left: 10px;">
                        <span style="font-weight: 700; color: var(--primary-color); font-size: 1.35rem; font-family: 'Playfair Display', serif; letter-spacing: 2px; text-transform: uppercase; line-height: 1;">FABRICON</span>
                        <span style="font-size: 0.6rem; color: #95a5a6; font-family: 'Montserrat', sans-serif; letter-spacing: 4px; text-transform: uppercase; margin-top: 4px;">Premium Textiles</span>
                    </div>
                </a>
            </div>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="shop.html">Browse Products</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <div class="container" style="margin-top: 40px; display: grid; grid-template-columns: 250px 1fr; gap: 30px;">
        <aside class="sidebar">
            <div style="text-align: center; margin-bottom: 20px;">
                <div
                    style="width: 80px; height: 80px; background: #eee; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;">
                    <i class="fa-solid fa-user" style="font-size: 30px; color: #aaa;"></i>
                </div>
                <h3>John Doe</h3>
            </div>
            <ul style="border-top: 1px solid #eee;">
                <li style="padding: 15px; border-bottom: 1px solid #eee; color: var(--accent-color); font-weight: 600;">
                    Overview</li>
                <li style="padding: 15px; border-bottom: 1px solid #eee; cursor: pointer;">Orders</li>
                <li style="padding: 15px; border-bottom: 1px solid #eee; cursor: pointer;">Messages</li>
                <li style="padding: 15px; border-bottom: 1px solid #eee; cursor: pointer;">Settings</li>
            </ul>
        </aside>

        <main>
            <h2 style="margin-bottom: 20px;">Dashboard</h2>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: var(--shadow-sm);">
                    <h3>Active Orders</h3>
                    <p style="font-size: 2rem; font-weight: 700; color: var(--primary-color);">2</p>
                </div>
                <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: var(--shadow-sm);">
                    <h3>Unread Messages</h3>
                    <p style="font-size: 2rem; font-weight: 700; color: var(--accent-color);">5</p>
                </div>
                <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: var(--shadow-sm);">
                    <h3>Saved Items</h3>
                    <p style="font-size: 2rem; font-weight: 700;">12</p>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
