<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - HosieryMarket</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-container {
            max-width: 500px;
            margin: 40px auto 60px;
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
        }

        .payment-methods {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .payment-method-box {
            flex: 1;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .payment-method-box.selected {
            border-color: var(--primary-color);
            background-color: rgba(29, 53, 87, 0.05);
        }

        .payment-method-box i {
            display: block;
            font-size: 24px;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .card-details {
            margin-top: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }
    </style>
</head>

<body class="lang-en">

    <!-- Header -->
    <header class="sticky-header">
        <div class="container header-content">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                    <img src="LOGO/Gemini_Generated_Image_d28pfqd28pfqd28p-removebg-preview.png" alt="Hosieryon Logo" style="height: 42px; width: auto; max-width: 200px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.06)); margin-right: 5px;">
                    <div style="display: flex; flex-direction: column; justify-content: center; margin-left: 10px;">
                        <span style="font-weight: 700; color: var(--primary-color); font-size: 1.35rem; font-family: 'Playfair Display', serif; letter-spacing: 2px; text-transform: uppercase; line-height: 1;">FABRICON</span>
                        <span style="font-size: 0.6rem; color: #95a5a6; font-family: 'Montserrat', sans-serif; letter-spacing: 4px; text-transform: uppercase; margin-top: 4px;">Premium Hosierys</span>
                    </div>
                </a>
            </div>

            <nav class="main-nav">
                <a href="index.html" data-en="Home" data-hi="होम">Home</a>
                <a href="shop.html" data-en="Browse Products" data-hi="उत्पाद ब्राउज़ करें">Browse Products</a>
                <a href="about.html" data-en="About" data-hi="हमारे बारे में">About</a>
                <a href="contact.html" data-en="Contact" data-hi="संपर्क करें">Contact</a>
            </nav>
            <div class="header-actions">
                <div class="lang-toggle" onclick="toggleLanguage()">
                    <span class="lang-option active" data-lang="en">EN</span>
                    <span class="separator">|</span>
                    <span class="lang-option" data-lang="hi">HI</span>
                </div>
                <a href="cart.html" class="cart-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-count">0</span>
                </a>
                <a href="login.html" class="auth-btn">
                    <i class="fa-solid fa-user"></i> Login
                </a>
            </div>

        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h2 data-en="Secure Payment" data-hi="सुरक्षित भुगतान">Secure Payment</h2>
        </div>
    </div>

    <div class="container">
        <div class="payment-container">
            <h3 style="margin-bottom: 20px; text-align:center;">Select Payment Method</h3>
            
            <div class="payment-methods">
                <div class="payment-method-box selected">
                    <i class="fa-regular fa-credit-card"></i>
                    <span>Credit Card</span>
                </div>
                <div class="payment-method-box">
                    <i class="fa-brands fa-paypal"></i>
                    <span>PayPal</span>
                </div>
                <div class="payment-method-box">
                    <i class="fa-solid fa-building-columns"></i>
                    <span>Bank</span>
                </div>
            </div>

            <form id="payment-form">
                <div class="card-details">
                    <div class="form-group">
                        <label>Cardholder Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" placeholder="XXXX-XXXX-XXXX-XXXX" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" placeholder="MM/YY" required>
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="password" placeholder="XXX" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" style="margin-top: 30px; padding: 15px; font-size: 1.1rem;">
                    <i class="fa-solid fa-lock" style="margin-right: 8px;"></i> Pay Now
                </button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container footer-content">
            <p data-en="© 2024 HosieryMarket. All rights reserved." data-hi="© 2024 होज़रीमार्केट। सर्वाधिकार सुरक्षित।">© 2024 HosieryMarket. All rights reserved.</p>
            <div class="footer-links">
                <a href="privacy.html" data-en="Privacy Policy" data-hi="गोपनीयता नीति">Privacy Policy</a>
                <a href="terms.html" data-en="Terms of Service" data-hi="सेवा की शर्तें">Terms of Service</a>
                <a href="about.html" style="margin-left: 20px;" data-en="About Us" data-hi="हमारे बारे में">About Us</a>
                <a href="contact.html" style="margin-left: 20px;" data-en="Contact" data-hi="संपर्क करें">Contact</a>
                <a href="faq.html" style="margin-left: 20px;" data-en="FAQ" data-hi="अक्सर पूछे जाने वाले प्रश्न">FAQ</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('payment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;

            setTimeout(() => {
                showToast('Payment successful! Order confirmed.', 'success');
                localStorage.removeItem('cart'); // Clear cart
                setTimeout(() => window.location.href = 'index.html', 2000);
            }, 1500);
        });

        // Simple mock method selector
        document.querySelectorAll('.payment-method-box').forEach(box => {
            box.addEventListener('click', () => {
                document.querySelectorAll('.payment-method-box').forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
            });
        });
    </script>
    <div id="toast-container"></div>
</body>
</html>
